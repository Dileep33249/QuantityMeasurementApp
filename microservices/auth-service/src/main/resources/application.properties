spring.application.name=auth-service

server.port=8081

spring.datasource.url=jdbc:h2:file:D:/UC17/microservices/data/authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

app.jwt.secret=VGhpc0lzQVN0cm9uZ0Rldk9ubHlKV1RTZWNyZXRLZXlGb3JRdWFudGl0eU1lYXN1cmVtZW50QXBw
app.jwt.expiration-ms=86400000
app.frontend.oauth-success-url=http://localhost:5173

spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=openid,profile,email

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
