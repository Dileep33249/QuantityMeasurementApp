spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
            allowCredentials: true
      routes:
        - id: auth-service
          uri: "${AUTH_SERVICE_URL:http://localhost:8081}"
          predicates:
            - Path=/api/v1/auth/**
        - id: auth-service-oauth2
          uri: "${AUTH_SERVICE_URL:http://localhost:8081}"
          predicates:
            - Path=/oauth2/**,/login/oauth2/**
        - id: quantity-measurement-service
          uri: "${QUANTITY_SERVICE_URL:http://localhost:8082}"
          predicates:
            - Path=/api/v1/quantities/**

server:
  port: ${PORT:8080}
  address: 0.0.0.0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
